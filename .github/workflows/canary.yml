name: Composer Ticker Canary

on:
  schedule:
    # 11:17 UTC
    # Triggers at approx 7:17 AM EDT to buffer against GitHub Actions queue delays
    # and ensure arrival by 8:17 AM EDT.
    - cron: '17 11 * * 1-5'
  workflow_dispatch:

# Move env to the workflow level to clear the Node warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Grant permissions to commit files back to the repo
permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests yfinance google-genai tzdata pandas numpy

      - name: Run Canary Radar
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # SEC EDGAR requires a User-Agent identifying the requester. Set as a
          # GitHub secret in the format: "Your Name your.email@example.com".
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: python canary_monitor.py
        
      - name: Commit Intel & Regime State to Repository
        run: |
          git config --global user.name "Canary-Bot"
          git config --global user.email "bot@example.com"
          git add daily_intel.json previous_regime.json previous_assets.json
          # Pull remote changes before pushing to prevent fetch-first rejections
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily market intel" && git pull --rebase origin main && git push)
